# ─────────────────────────────────────────────────────────────────────
# Herald Notification Gateway — Local Development Stack
# ─────────────────────────────────────────────────────────────────────
# Usage: docker compose -f docker/docker-compose.dev.yml up -d
# ─────────────────────────────────────────────────────────────────────
# Starts Redis + the API gateway + the background worker.
# Postgres is expected to already be running on the host.
# ─────────────────────────────────────────────────────────────────────

services:
  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: herald-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - herald_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - herald-net

  # ── API Gateway (hot-reload via nest start --watch) ────────────────
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: herald-gateway
    command: pnpm run start:dev
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:admin@host.docker.internal:5432/herald_gateway?schema=public
      - REDIS_URL=redis://redis:6379
    env_file:
      - ../.env
    volumes:
      - ..:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - herald-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Background Worker (restarts when dist/ changes) ────────────────
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: herald-worker
    command: >
      sh -c "pnpm run build && node --watch dist/worker-main.js"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:admin@host.docker.internal:5432/herald_gateway?schema=public
      - REDIS_URL=redis://redis:6379
    env_file:
      - ../.env
    volumes:
      - ..:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - herald-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  herald-net:
    driver: bridge

volumes:
  herald_redis_data:
