version: '3.8'

services:
  # ── PgBouncer (Connection Pooling) ─────────────────────────────────
  pgbouncer:
    image: pgbouncer/pgbouncer:1.17
    container_name: herald-pgbouncer
    restart: always
    environment:
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=10
      - MIN_POOL_SIZE=2
      - RESERVE_POOL_SIZE=5
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pgbouncer -h localhost -p 6432 -U postgres herald"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Herald Notification Gateway ───────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: herald-gateway
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@pgbouncer:5432/herald?pgbouncer=true
      - REDIS_URL=${REDIS_URL}
      - NITRO_ENCLAVE_SOCKET=/run/enclave.sock
    env_file:
      - ../.env
    volumes:
      - shared-run:/run
    ports:
      - "3000:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy

  # ── Mock Enclave ($0 Budget TEE Simulation) ──────────────────────────
  mock-enclave:
    image: node:20-alpine
    container_name: mock-enclave
    restart: always
    working_dir: /app
    volumes:
      - ./mock-enclave.js:/app/mock-enclave.js
      - shared-run:/run
    command: node /app/mock-enclave.js

volumes:
  shared-run:
