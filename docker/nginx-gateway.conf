# ─────────────────────────────────────────────────────────────────────
# herald-notification-gateway — nginx reverse proxy config
# ─────────────────────────────────────────────────────────────────────
#
# Place at: /etc/nginx/conf.d/herald-gateway.conf
# (or include from your main nginx.conf)
#
# How it works:
#   - nginx terminates SSL on the EC2 host (port 443)
#   - The upstream resolves via AWS Cloud Map (VPC DNS)
#   - The VPC DNS resolver at 169.254.169.253 is used so nginx
#     re-resolves the ECS task IP on each request (tasks can be
#     replaced with new IPs during deployments)
#
# Prerequisites:
#   1. ECS Service registered with Cloud Map namespace "herald.local"
#      Service name: herald-gateway  →  herald-gateway.herald.local
#   2. SSL certificate at /etc/nginx/ssl/ (e.g. Let's Encrypt / ACM)
#   3. Security Group on the gateway EC2 allows outbound TCP 3000
#      to the Fargate task security group
# ─────────────────────────────────────────────────────────────────────

# Use the AWS VPC DNS resolver. valid=10s forces re-resolution
# every 10 seconds so stale IPs from replaced ECS tasks are cleared.
resolver 169.254.169.253 valid=10s ipv6=off;

server {
    listen 80;
    server_name api.useherald.xyz;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.useherald.xyz;

    # ── SSL ────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/api.useherald.xyz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.useherald.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ───────────────────────────────────────────
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";

    # ── Upstream (Cloud Map DNS, re-resolved dynamically) ──────────
    # Using a variable forces nginx to honour the resolver directive.
    set $gateway_upstream herald-gateway.herald.local;

    location / {
        proxy_pass         http://$gateway_upstream:3000;
        proxy_http_version 1.1;

        # Preserve original client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if ever needed)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts — match NestJS TimeoutInterceptor (30s)
        proxy_connect_timeout 10s;
        proxy_read_timeout    35s;
        proxy_send_timeout    35s;
    }

    # ── Health check endpoint (no access log noise) ────────────────
    location /health {
        proxy_pass         http://$gateway_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }
}
