# ─────────────────────────────────────────────────────────────────────
# herald-proxy — master reverse proxy config
# ─────────────────────────────────────────────────────────────────────
# This configures a single Nginx instance to route traffic for the 
# entire Herald ecosystem using AWS Cloud Map (VPC DNS).
# ─────────────────────────────────────────────────────────────────────

# Use the AWS VPC DNS resolver (valid=10s ensures fresh ECS IPs)
resolver 169.254.169.253 valid=10s ipv6=off;

# ── GATEWAY: api.useherald.xyz ───────────────────────────────────────
server {
    listen 80;
    server_name api.useherald.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.useherald.xyz;

    ssl_certificate     /etc/nginx/ssl/live/api.useherald.xyz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.useherald.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    set $gateway_upstream herald-gateway.herald.local;

    location / {
        proxy_pass         http://$gateway_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass         http://$gateway_upstream:3000;
        access_log         off;
    }
}

# ── ADMIN API: api.register.useherald.xyz ────────────────────────────
server {
    listen 80;
    server_name api.register.useherald.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.register.useherald.xyz;

    ssl_certificate     /etc/nginx/ssl/live/api.register.useherald.xyz/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.register.useherald.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    set $admin_upstream herald-admin-api.herald.local;

    location / {
        proxy_pass         http://$admin_upstream:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # WebSocket support for admin-api status updates
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Telegram Webhook needs larger body size
    location /v1/telegram/webhook {
        proxy_pass          http://$admin_upstream:3001;
        client_max_body_size 10m;
        proxy_set_header    Host $host;
    }
}
