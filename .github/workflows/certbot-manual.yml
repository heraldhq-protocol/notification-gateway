name: Issue SSL Cert via acme.sh

on:
  workflow_dispatch:

jobs:
  issue-cert:
    runs-on: ubuntu-latest
    steps:
      - name: Install acme.sh
        run: curl https://get.acme.sh | sh -s email=herald.admin@gmail.com

      - name: Issue cert and verify in one shot
        run: |
          ~/.acme.sh/acme.sh --issue \
            --dns \
            -d api.useherald.xyz \
            -d api.register.useherald.xyz \
            --yes-I-know-dns-manual-mode-enough-go-ahead-please \
            --force

          # Wait for DNS (already propagated, so verify immediately)
          sleep 10

          ~/.acme.sh/acme.sh --renew \
            -d api.useherald.xyz \
            --yes-I-know-dns-manual-mode-enough-go-ahead-please

      - name: Print base64 certs
        run: |
          echo "=== FULLCHAIN ==="
          cat ~/.acme.sh/api.useherald.xyz_ecc/fullchain.cer | base64 -w 0
          echo ""
          echo "=== KEY ==="
          cat ~/.acme.sh/api.useherald.xyz_ecc/api.useherald.xyz.key | base64 -w 0