name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_install:
        description: 'Force a clean reinstall (wipes node_modules)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLEAN_BUILD: ${{ github.event.inputs.clean_install == 'true' || contains(github.event.head_commit.message, '[clean]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

          cat > ~/.ssh/config <<EOF
          Host ec2-deploy
            HostName ${{ env.EC2_HOST }}
            User ${{ env.EC2_USER }}
            IdentityFile ~/.ssh/ec2_key.pem
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ConnectTimeout 60
            ConnectionAttempts 3
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ec2-16-171-128-29.eu-north-1.compute.amazonaws.com
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            CLEAN_BUILD="${{ env.CLEAN_BUILD }}"
            APP_DIR="$HOME/notification-gateway"
            PM2_APP_NAME="herald-gateway"
            HEALTH_URL="http://localhost:3000/health/live"

            rollback() {
              echo "Deployment failed - rolling back..."
              cd "$APP_DIR"
              if [ -d ".git" ]; then
                git reset --hard HEAD~1 2>/dev/null || true
              fi
              pm2 restart "$PM2_APP_NAME" --update-env || pm2 start ecosystem.config.js --update-env
              pm2 save
              exit 1
            }

            trap rollback ERR

            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            cd "$APP_DIR"
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/heraldhq-protocol/notification-gateway.git

            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            export NODE_OPTIONS="--max-old-space-size=450"

            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude=.env

            if [ "$CLEAN_BUILD" = "true" ]; then
              echo "Performing clean install..."
              rm -rf node_modules
            fi

            pnpm install --frozen-lockfile --ignore-scripts
            pnpm db:generate
            pnpm build

            pm2 stop all || true
            pm2 delete mock-enclave || true
            pm2 start ecosystem.config.js --update-env
            pm2 save
            pm2 status

            for i in $(seq 1 6); do
              sleep 5
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
              echo "Health check $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "Deployment successful!"
                trap - ERR
                exit 0
              fi
            done

            echo "Health check failed"
            rollback
