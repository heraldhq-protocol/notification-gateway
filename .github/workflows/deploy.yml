name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_install:
        description: 'Force a clean reinstall (wipes node_modules)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLEAN_BUILD: ${{ github.event.inputs.clean_install == 'true' || contains(github.event.head_commit.message, '[clean]') }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ec2-13-60-198-43.eu-north-1.compute.amazonaws.com
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Set Clean Build flag
            CLEAN_BUILD="${{ env.CLEAN_BUILD }}"
            
            # Ensure GitHub is in known_hosts
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true
            
            # Setup Git credentials
            cd ~/notification-gateway
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/heraldhq-protocol/notification-gateway.git

            # Install PM2 if missing
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            cd ~/notification-gateway
            export NODE_OPTIONS="--max-old-space-size=450"
            
            # Force sync with repository while preserving .env
            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude=.env

            # Conditional Clean Install
            if [ "$CLEAN_BUILD" = "true" ]; then
              echo "⚠️ Performing clean install..."
              rm -rf node_modules pnpm-lock.yaml
            fi

            # Efficient dependency install
            pnpm install

            # Explicitly generate Prisma Client for the target architecture
            pnpm db:generate

            # Build the application
            pnpm build
            
            # Reset processes to ensure fresh socket binding
            # Use 'pm2 delete' for the mock-enclave specifically as it binds to a file
            pm2 stop all || true
            pm2 delete mock-enclave || true
            
            # Start/Reload everything using Ecosystem file
            pm2 start ecosystem.config.js --update-env
            
            pm2 save
            pm2 status