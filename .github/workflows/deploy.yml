# ─────────────────────────────────────────────────────────────────────
# Herald Notification Gateway — Deploy to ECR + ECS Fargate
# ─────────────────────────────────────────────────────────────────────
# Pipeline:
#   validate → ┬─ migrate      ─┐
#              └─ build-push-ecr─┴─ deploy-ecs
#
# Required GitHub Secrets:
#   AWS_ACCOUNT_ID, AWS_REGION, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   ECR_GATEWAY_REPO_URI, ECR_ENCLAVE_REPO_URI
#   ECS_CLUSTER, ECS_GATEWAY_SERVICE, ECS_GATEWAY_TASK_FAMILY
#   DIRECT_URL  (direct RDS URL for migrations, not routed via pgbouncer)
# ─────────────────────────────────────────────────────────────────────

name: Deploy to ECS Fargate

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:           eu-north-1
  ECS_CLUSTER:          ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE:          ${{ secrets.ECS_GATEWAY_SERVICE }}
  ECR_GATEWAY_REPO:     ${{ secrets.ECR_GATEWAY_REPO_URI }}
  ECR_ENCLAVE_REPO:     ${{ secrets.ECR_ENCLAVE_REPO_URI }}
  TASK_DEFINITION_FILE: docker/task-definition.gateway.json

jobs:
  # ── 1. Validate ──────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL:   ${{ secrets.DIRECT_URL }}

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: npx tsc --noEmit

  # ── 2a. Migrate (parallel with build) ────────────────────────────────
  # Runs prisma migrate deploy against the direct RDS URL from CI.
  # Uses DIRECT_URL (bypasses pgbouncer) so DDL transactions work.
  migrate:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL:   ${{ secrets.DIRECT_URL }}

      - name: Run database migrations
        run: |
          EXIT_CODE=0
          npx prisma migrate deploy > /tmp/migrate.log 2>&1 || EXIT_CODE=$?
          cat /tmp/migrate.log

          if [ $EXIT_CODE -ne 0 ]; then
            if grep -q "P3009\|P3005\|P3018" /tmp/migrate.log && grep -q "already exists" /tmp/migrate.log; then
              echo "⚠️ Baselining existing database..."
              for dir in prisma/migrations/*/; do
                NAME=$(basename "$dir")
                [ "$NAME" != "*" ] && npx prisma migrate resolve --applied "$NAME" || true
              done
              npx prisma migrate deploy
            else
              echo "❌ Migration failed"
              exit 1
            fi
          fi

          echo "✅ Migrations complete"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL:   ${{ secrets.DIRECT_URL }}

  # ── 2b. Build & Push to ECR (parallel with migrate) ──────────────────
  build-push-ecr:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      gateway-image: ${{ steps.push-gateway.outputs.image }}
      enclave-image: ${{ steps.push-enclave.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push gateway image
        id: push-gateway
        run: |
          IMAGE="${{ env.ECR_GATEWAY_REPO }}:${{ github.sha }}"
          docker build -f docker/Dockerfile \
            -t "$IMAGE" \
            -t "${{ env.ECR_GATEWAY_REPO }}:latest" \
            .
          docker push "${{ env.ECR_GATEWAY_REPO }}" --all-tags
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push mock-enclave image
        id: push-enclave
        run: |
          IMAGE="${{ env.ECR_ENCLAVE_REPO }}:${{ github.sha }}"
          docker build -f docker/Dockerfile.enclave \
            -t "$IMAGE" \
            -t "${{ env.ECR_ENCLAVE_REPO }}:latest" \
            .
          docker push "${{ env.ECR_ENCLAVE_REPO }}" --all-tags
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ── 3. Deploy to ECS ─────────────────────────────────────────────────
  deploy-ecs:
    needs: [migrate, build-push-ecr]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Inject the new gateway image URI into the task definition
      - name: Render task definition — gateway container
        id: render-gateway
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  ${{ env.TASK_DEFINITION_FILE }}
          container-name:   gateway
          image:            ${{ needs.build-push-ecr.outputs.gateway-image }}

      # Inject the new enclave image URI (second render pass)
      - name: Render task definition — mock-enclave container
        id: render-enclave
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  ${{ steps.render-gateway.outputs.task-definition }}
          container-name:   mock-enclave
          image:            ${{ needs.build-push-ecr.outputs.enclave-image }}

      - name: Deploy to ECS and wait for stability
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:         ${{ steps.render-enclave.outputs.task-definition }}
          service:                 ${{ env.ECS_SERVICE }}
          cluster:                 ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:        10