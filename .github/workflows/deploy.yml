name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_install:
        description: 'Force a clean reinstall (wipes node_modules)'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLEAN_BUILD: ${{ github.event.inputs.clean_install == 'true' || contains(github.event.head_commit.message, '[clean]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

          cat > ~/.ssh/config <<EOF
          Host ec2-deploy
            HostName ${{ env.EC2_HOST }}
            User ${{ env.EC2_USER }}
            IdentityFile ~/.ssh/ec2_key.pem
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ConnectTimeout 60
            ConnectionAttempts 3
            ServerAliveInterval 30
            ServerAliveCountMax 3
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ec2-16-171-128-29.eu-north-1.compute.amazonaws.com
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            CLEAN_BUILD="${{ env.CLEAN_BUILD }}"
            APP_DIR="$HOME/notification-gateway"
            PM2_APP_NAME="herald-gateway"

            rollback() {
              echo "Deployment failed - rolling back..."
              cd "$APP_DIR"
              if [ -d ".git" ]; then
                git reset --hard HEAD~1 2>/dev/null || true
              fi
              pm2 restart "$PM2_APP_NAME" --update-env || pm2 start ecosystem.config.js --update-env
              pm2 save
              exit 1
            }

            trap rollback ERR

            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            cd "$APP_DIR"
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/heraldhq-protocol/notification-gateway.git

            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            export NODE_OPTIONS="--max-old-space-size=450"

            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude=.env

            if [ "$CLEAN_BUILD" = "true" ]; then
              echo "Performing clean install..."
              rm -rf node_modules
            fi

            pnpm install --frozen-lockfile --ignore-scripts
            
            # Get variables directly since gateway uses .env instead of github secrets in deployment shell
            if [ -f .env ]; then
              source <(grep -E '^(DATABASE_URL|DIRECT_URL)=' .env | xargs)
            fi
            
            # Export clean URLs (stripping quotes if any were typed in GitHub Secrets)
            CLEAN_DB=$(echo "$DATABASE_URL" | sed 's/"//g')
            CLEAN_DIRECT=$(echo "$DIRECT_URL" | sed 's/"//g')
            
            # Enforce SSL & Timeout for runtime
            if [[ "$CLEAN_DB" != *"sslmode"* ]]; then
              if [[ "$CLEAN_DB" == *"?"* ]]; then
                CLEAN_DB="${CLEAN_DB}&sslmode=no-verify&connect_timeout=30"
              else
                CLEAN_DB="${CLEAN_DB}?sslmode=no-verify&connect_timeout=30"
              fi
            fi

            # Enforce SSL & Timeout for migrations
            if [[ "$CLEAN_DIRECT" != *"sslmode"* ]]; then
              if [[ "$CLEAN_DIRECT" == *"?"* ]]; then
                CLEAN_DIRECT="${CLEAN_DIRECT}&sslmode=no-verify&connect_timeout=30"
              else
                CLEAN_DIRECT="${CLEAN_DIRECT}?sslmode=no-verify&connect_timeout=30"
              fi
            fi

            export DATABASE_URL="$CLEAN_DB"
            export DIRECT_URL="$CLEAN_DIRECT"
            
            echo "--- Verifying Connectivity ---"
            RDS_HOST=$(echo "$CLEAN_DB" | awk -F'[@:]' '{print $4}')
            REDIS_URL=$(grep "^REDIS_URL=" .env | cut -d'=' -f2- | sed 's/"//g')
            REDIS_HOST=$(echo "$REDIS_URL" | awk -F'[@:]' '{print $4}')
            
            echo "Testing RDS ($RDS_HOST)..."
            node -e "const net = require('net'); const client = net.connect(5432, '$RDS_HOST', () => { console.log('✅ RDS Connected'); client.destroy(); }); client.on('error', (e) => { console.error('❌ RDS Failure:', e.message); process.exit(1); }); client.setTimeout(5000, () => { console.error('❌ RDS Timeout'); process.exit(1); });"
            
            if [ -n "$REDIS_HOST" ]; then
              echo "Testing Redis ($REDIS_HOST)..."
              node -e "const net = require('net'); const client = net.connect(6379, '$REDIS_HOST', () => { console.log('✅ Redis Connected'); client.destroy(); }); client.on('error', (e) => { console.error('❌ Redis Failure:', e.message); process.exit(1); }); client.setTimeout(5000, () => { console.error('❌ Redis Timeout'); process.exit(1); });" || echo "⚠️ Warning: Redis is unreachable."
            fi

            pnpm db:generate
            
            # Safely capture migration exit code
            EXIT_CODE=0
            npx prisma migrate deploy > /tmp/prisma_deploy.log 2>&1 || EXIT_CODE=$?
            cat /tmp/prisma_deploy.log
            
            if [ $EXIT_CODE -ne 0 ]; then
              if grep -q "P3009" /tmp/prisma_deploy.log || grep -q "P3005" /tmp/prisma_deploy.log || { grep -q "P3018" /tmp/prisma_deploy.log && grep -q "already exists" /tmp/prisma_deploy.log; }; then
                echo "⚠️ Existing database detected. Baselining..."
                for dir in prisma/migrations/*/; do
                  MIGRATION_NAME=$(basename "$dir")
                  [ "$MIGRATION_NAME" != "*" ] && npx prisma migrate resolve --applied "$MIGRATION_NAME" || true
                done
                npx prisma migrate deploy
              else
                echo "❌ Migration failed"
                exit 1
              fi
            fi
            
            pnpm build

            # Get PORT from .env
            if [ -f .env ]; then
              source <(grep -E '^PORT=' .env | xargs)
            fi
            PORT="${PORT:-3000}"
            HEALTH_URL="http://localhost:${PORT}/health/live"
            echo "Using PORT=$PORT"

            pm2 stop all || true
            pm2 delete mock-enclave || true
            pm2 start ecosystem.config.js --update-env
            pm2 save
            pm2 status

            echo "Waiting 10s for app to start..."
            sleep 10

            # Check PM2 logs for errors
            echo "=== PM2 Error Logs (last 50 lines) ==="
            pm2 logs "$PM2_APP_NAME" --nostream --lines 50 --err || true
            echo "=== PM2 Out Logs (last 50 lines) ==="
            pm2 logs "$PM2_APP_NAME" --nostream --lines 50 --out || true

            # Health check debugging
            for i in $(seq 1 10); do
              HTTP_RESP=$(curl -is "http://localhost:${PORT}/health" || true)
              STATUS=$(echo "$HTTP_RESP" | grep HTTP | awk '{print $2}' || echo "000")
              BODY=$(echo "$HTTP_RESP" | grep "^{" || echo "No JSON response")
              
              echo "Health check $i: HTTP $STATUS"
              if [ "$STATUS" != "200" ]; then
                echo "Detailed Body: $BODY"
              fi
              
              if [ "$STATUS" = "200" ]; then
                echo "✅ Deployment successful!"
                trap - ERR
                exit 0
              fi
              sleep 3
            done

            echo "Health check failed"
            rollback
