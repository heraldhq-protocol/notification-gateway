# ─────────────────────────────────────────────────────────────────────
# Herald Notification Gateway — Deploy to ECR + ECS Fargate
# ─────────────────────────────────────────────────────────────────────
# Pipeline:
#   validate ── build-push-ecr ── deploy-ecs
#
# Migrations run inside the ECS container on startup (entrypoint.sh),
# so CI never needs direct access to RDS. This allows RDS inbound to be
# locked down to the ECS/application security groups only.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   ECR_GATEWAY_REPO_URI, ECR_ENCLAVE_REPO_URI
#   ECS_CLUSTER, ECS_GATEWAY_SERVICE
# ─────────────────────────────────────────────────────────────────────

name: Deploy to ECS Fargate

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION:           eu-north-1
  ECS_CLUSTER:          ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE:          ${{ secrets.ECS_GATEWAY_SERVICE }}
  ECR_GATEWAY_REPO:     ${{ secrets.ECR_GATEWAY_REPO_URI }}
  ECR_ENCLAVE_REPO:     ${{ secrets.ECR_ENCLAVE_REPO_URI }}
  TASK_DEFINITION_FILE: docker/task-definition.gateway.json

jobs:
  # ── 1. Validate ──────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          # prisma generate only reads the schema — no real DB connection needed
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL:   postgresql://ci:ci@localhost:5432/ci

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: npx tsc --noEmit

  # ── 2. Build & Push to ECR ───────────────────────────────────────────
  build-push-ecr:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.push-gateway.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push gateway image
        id: push-gateway
        run: |
          IMAGE="${{ env.ECR_GATEWAY_REPO }}:${{ github.sha }}"
          docker build -f docker/Dockerfile \
            -t "$IMAGE" \
            -t "${{ env.ECR_GATEWAY_REPO }}:latest" \
            .
          docker push "${{ env.ECR_GATEWAY_REPO }}" --all-tags
          echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push mock-enclave image
        run: |
          IMAGE="${{ env.ECR_ENCLAVE_REPO }}:${{ github.sha }}"
          docker build -f docker/Dockerfile.enclave \
            -t "$IMAGE" \
            -t "${{ env.ECR_ENCLAVE_REPO }}:latest" \
            .
          docker push "${{ env.ECR_ENCLAVE_REPO }}" --all-tags

  # ── 3. Deploy to ECS ─────────────────────────────────────────────────
  deploy-ecs:
    needs: [build-push-ecr]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Render task definition — gateway container
        id: render-gateway
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  ${{ env.TASK_DEFINITION_FILE }}
          container-name:   gateway
          image:            ${{ env.ECR_GATEWAY_REPO }}:${{ needs.build-push-ecr.outputs.image-tag }}

      - name: Render task definition — mock-enclave container
        id: render-enclave
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  ${{ steps.render-gateway.outputs.task-definition }}
          container-name:   mock-enclave
          image:            ${{ env.ECR_ENCLAVE_REPO }}:${{ needs.build-push-ecr.outputs.image-tag }}

      - name: Deploy to ECS and wait for stability
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.render-enclave.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:           10

      - name: Tail CloudWatch logs (always — catches DB/Redis errors post-start)
        if: always()
        run: |
          LOG_GROUP="/ecs/herald-gateway"
          echo "=== Recent container logs from $LOG_GROUP ==="

          STREAM=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime \
            --descending \
            --limit 1 \
            --no-paginate \
            --query 'logStreams[0].logStreamName' \
            --output text) || { echo "ERROR: could not list log streams (check IAM logs:DescribeLogStreams permission)"; exit 0; }

          if [ -z "$STREAM" ] || [ "$STREAM" = "None" ]; then
            echo "No log streams found in $LOG_GROUP"
            exit 0
          fi

          echo "Log stream: $STREAM"
          aws logs get-log-events \
            --log-group-name "$LOG_GROUP" \
            --log-stream-name "$STREAM" \
            --start-time $(date -d '15 minutes ago' +%s000) \
            --limit 200 \
            --no-paginate \
            --query 'events[*].message' \
            --output text || echo "ERROR: could not read log events (check IAM logs:GetLogEvents permission)"
