name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ec2-13-60-198-43.eu-north-1.compute.amazonaws.com
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install PM2 if missing
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            cd ~/notification-gateway
            git pull origin main

            # Clean install (fixes corrupted node_modules)
            rm -rf node_modules

            pnpm install
            pnpm build
            
            # Start or Restart
            if pm2 describe herald-notification-gateway > /dev/null 2>&1; then
              echo "Restarting existing process..."
              pm2 restart herald-notification-gateway
            else
              echo "Starting new process..."
              pm2 start dist/main.js --name "herald-notification-gateway"
            fi
            
            pm2 save